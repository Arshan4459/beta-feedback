# Your own infra box (or local, once Docker is installed): Postgres + MinIO
# (S3-compatible object storage) + the self-hosted Whisper transcription worker.
# The Next.js web tier runs on Netlify and connects to these over the network.
#
#   cp .env.example .env   # fill POSTGRES_PASSWORD, S3 keys, etc.
#   docker compose up -d
#   # then run migrations against this Postgres from the app:
#   DATABASE_URL=postgres://feedback:...@<host>:5432/feedback npm run db:migrate

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: feedback
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: feedback
    # Host 5433 to avoid a local Postgres already on 5432.
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    # Host 9100/9101 to avoid an SSH tunnel already on 9000.
    ports: ["9100:9000", "9101:9001"]
    volumes: ["miniodata:/data"]
    restart: unless-stopped

  # One-shot: create the bucket and apply CORS so the browser can PUT clips.
  createbucket:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${S3_ACCESS_KEY_ID:-minioadmin} $${S3_SECRET_ACCESS_KEY:-minioadmin}; do sleep 1; done &&
      mc mb -p local/$${S3_BUCKET:-feedback-audio} || true;
      exit 0"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgres://feedback:${POSTGRES_PASSWORD:-change-me}@postgres:5432/feedback
      DATABASE_SSL: "false"
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-feedback-audio}
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: "true"
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    depends_on: [postgres, createbucket]
    # Persist the downloaded Whisper model across restarts.
    volumes: ["hfcache:/root/.cache/huggingface"]
    restart: unless-stopped

volumes:
  pgdata: {}
  miniodata: {}
  hfcache: {}
